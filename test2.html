<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5 Dropdown with Subcategories</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Ensure dropdown opens on hover for large screens */
        @media (min-width: 992px) {
            .hover-dropdown:hover .dropdown-menu {
                display: block;
                margin-top: 0;
            }
            .dropdown-submenu:hover .dropdown-menu {
                display: block;
                left: 100%;
                top: 0;
                margin-top: -1px;
            }
        }

        /* Adjust dropdown alignment */
        .dropdown-menu {
            min-width: 250px;
        }

        /* Make submenu appear at the side */
        .dropdown-submenu {
            position: relative;
        }

        .dropdown-submenu .dropdown-menu {
            top: 0;
            left: 100%;
            margin-left: 0.1rem;
            display: none;
            position: absolute;
        }

        /* Add caret indicator for submenus */
        .dropdown-submenu > a::after {
            content: " ►";
            float: right;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Brand</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item dropdown hover-dropdown">
                    <a class="nav-link text-white dropdown-toggle" href="#" id="navbarDropdownManufacturing" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Manufacturing
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="navbarDropdownManufacturing">
                        <li><a class="dropdown-item" href="#">Selective Laser Sintering (SLS)</a></li>
                        <li><a class="dropdown-item" href="#">Binder Jetting</a></li>
                        <li><a class="dropdown-item" href="#">Multi Jet Fusion (MJF)</a></li>

                        <!-- Submenu Example -->
                        <li class="dropdown-submenu">
                            <a class="dropdown-item" href="#">More Technologies</a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">Stereolithography (SLA)</a></li>
                                <li><a class="dropdown-item" href="#">Material Jetting</a></li>
                                <li><a class="dropdown-item" href="#">Wax Casting</a></li>
                            </ul>
                        </li>

                        <li><a class="dropdown-item" href="#">Fused Deposition Modeling (FDM)</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        // Enable submenu click functionality on mobile screens
        let dropdowns = document.querySelectorAll(".dropdown-submenu > a");
        dropdowns.forEach(function (dropdown) {
            dropdown.addEventListener("click", function (e) {
                if (window.innerWidth < 992) {
                    e.preventDefault();
                    let submenu = this.nextElementSibling;
                    submenu.style.display = submenu.style.display === "block" ? "none" : "block";
                }
            });
        });
    });
</script>

</body>
</html>
